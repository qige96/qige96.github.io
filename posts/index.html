<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客 - Ricky Zhu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf9f7;
            --text: #1a1a1a;
            --text-secondary: #666;
            --text-tertiary: #999;
            --border: #e8e8e8;
            --accent: #2563eb;
            --card-bg: #fff;
            --code-bg: #f4f4f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            font-size: 16px;
        }

        nav {
            position: sticky;
            top: 0;
            background: rgba(250, 249, 247, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .nav-inner {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-weight: 700;
            font-size: 18px;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 28px;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--text); }

        main {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.8px;
            margin-bottom: 32px;
        }

        .post-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .post-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .post-card:hover {
            border-color: var(--text-tertiary);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .post-card time {
            font-size: 13px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .post-card h3 {
            font-size: 18px;
            font-weight: 600;
            margin: 8px 0 10px;
            letter-spacing: -0.3px;
        }

        .post-card p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .post-card .tags {
            margin-top: 14px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .post-card .tag {
            font-size: 12px;
            color: var(--text-tertiary);
            background: var(--bg);
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        footer {
            text-align: center;
            padding: 40px 24px;
            border-top: 1px solid var(--border);
            color: var(--text-tertiary);
            font-size: 13px;
        }

        @media (max-width: 600px) {
            main { padding: 40px 20px 60px; }
            h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="/" class="logo">Ricky Zhu</a>
            <div class="nav-links">
                <a href="/">首页</a>
                <a href="/posts/">博客</a>
                <a href="/about.html">关于</a>
            </div>
        </div>
    </nav>

    <main>
        <h1>博客</h1>
        <div class="post-list">
            <a href="/posts/ai-agent-workflow-patterns/" class="post-card">
                <time>2025-05-24</time>
                <h3>AI Agent 的工作流设计模式</h3>
                <p>最近在做 AI Agent 相关的项目，梳理了几种常见的工作流设计模式。记录一下，也作为后续迭代的参考。</p>
                <div class="tags">
                    <span class="tag">AI</span>
                    <span class="tag">Agent</span>
                    <span class="tag">LLM</span>
                </div>
            </a>

            <a href="/posts/hello-world/" class="post-card">
                <time>2025-05-24</time>
                <h3>Hello World</h3>
                <p>这是这个博客的第一篇文章。记录搭建这个网站的过程，以及一些关于技术选型的思考。</p>
                <div class="tags">
                    <span class="tag">meta</span>
                </div>
            </a>
        </div>
    </main>

    <footer>
        <p>© 2025 Ricky Zhu</p>
    </footer>
</body>
</html>
